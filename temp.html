      font-size: 40px;

      padding: 0 25px 15px;
      font-size: 0.9rem;
      color: #666;
      border-bottom: 1px solid #eee;
      margin-bottom: 20px;
    }

      width: 100%;
      max-height: 400px;
      object-fit: contain;
      margin:20px auto;
      background-color: #f0f0f0;
    }

    .detail-content {
      padding: 0 25px 30px;
      line-height: 1.8;
      font-size:24px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

      .detail-container {
        min-height:100vh;
        margin:0 10px;
        padding:10px 0;
        border-radius:0;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
